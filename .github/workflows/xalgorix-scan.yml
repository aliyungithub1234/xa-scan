name: xalgorix-scan

on:
  workflow_dispatch:
    inputs:
      target:
        description: >
          扫描目标（支持4种格式）：
          1. 单目标: https://example.com
          2. 多目标（逗号分隔）: https://a.com,https://b.com
          3. 文件路径: targets.txt（仓库根目录下的文件，每行一个目标）
          4. URL下载列表: https://raw.githubusercontent.com/.../targets.txt
        required: true
        default: 'targets.txt'
      instruction:
        description: '自定义扫描指令（可选）'
        required: false
        default: ''
      model:
        description: 'Kimi 模型（默认 kimi/kimi-for-coding）'
        required: false
        default: 'kimi/kimi-for-coding'
      max_iterations:
        description: '每个目标最大迭代次数（默认 80）'
        required: false
        default: '100'
      parallel:
        description: '并行扫描数量（默认 3，最多 5）'
        required: false
        default: '5'
      shuffle:
        description: '随机打乱目标顺序（默认 true）'
        required: false
        default: 'true'
      timeout:
        description: '每个目标超时分钟（默认 90）'
        required: false
        default: '180'

defaults:
  run:
    shell: bash

env:
  XALGORIX_DING_WEBHOOK: ${{ secrets.DING_WEBHOOK }}
  XALGORIX_DING_SECRET: ${{ secrets.DING_SECRET }}
  XALGORIX_LLM: ${{ github.event.inputs.model }}
  XALGORIX_API_KEY: ${{ secrets.KIMI_API_KEY }}
  XALGORIX_API_BASE: 'https://api.kimi.com/coding/v1'
  XALGORIX_GUARD_MODE: ${{ secrets.XALGORIX_GUARD_MODE || 'strict' }}

jobs:
  prepare:
    name: 'Parse Targets'
    runs-on: ubuntu-latest
    outputs:
      targets_json: ${{ steps.parse.outputs.targets_json }}
      total: ${{ steps.parse.outputs.total }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Parse Targets
        id: parse
        run: |
          INPUT='${{ github.event.inputs.target }}'
          SHUFFLE='${{ github.event.inputs.shuffle }}'
          TMP_FILE="/tmp/targets_raw.txt"

          echo "========================================"
          echo "  Target Parser"
          echo "========================================"
          echo "Input: $INPUT"
          echo ""

          # Mode 1: Remote URL list
          if echo "$INPUT" | grep -qiE '^https?://.*\.(txt|list|csv)$'; then
            echo "[Mode 1] Downloading remote list..."
            curl -sL "$INPUT" -o "$TMP_FILE" 2>/dev/null
            if [ ! -s "$TMP_FILE" ]; then
              echo "Download failed, treating as single target"
              echo "$INPUT" > "$TMP_FILE"
            fi
          # Mode 2: Local file
          elif echo "$INPUT" | grep -qiE '\.(txt|list|csv)$'; then
            FILE="$(echo "$INPUT" | tr -d ' ')"
            if [ -f "$FILE" ]; then
              echo "[Mode 2] Reading local file: $FILE"
              cp "$FILE" "$TMP_FILE"
            else
              echo "File not found: $FILE, treating as single target"
              echo "$INPUT" > "$TMP_FILE"
            fi
          # Mode 3: Comma-separated
          elif echo "$INPUT" | grep -q ','; then
            echo "[Mode 3] Parsing comma-separated targets"
            echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' > "$TMP_FILE"
          # Mode 4: Single target
          else
            echo "[Mode 4] Single target"
            echo "$INPUT" > "$TMP_FILE"
          fi

          # Clean: dedup, trim, filter comments
          CLEAN_FILE="/tmp/targets_clean.txt"
          grep -vE '^[[:space:]]*$|^[[:space:]]*#' "$TMP_FILE" | \
            sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | \
            sort -u > "$CLEAN_FILE"

          TOTAL=$(wc -l < "$CLEAN_FILE")
          echo ""
          echo "Total unique targets: $TOTAL"

          if [ "$SHUFFLE" = "true" ]; then
            shuf "$CLEAN_FILE" > /tmp/targets_shuf.txt
            mv /tmp/targets_shuf.txt "$CLEAN_FILE"
            echo "Order shuffled"
          fi

          echo ""
          echo "Target list:"
          nl -w2 -s'. ' "$CLEAN_FILE" | head -20
          [ "$TOTAL" -gt 20 ] && echo "  ... and $((TOTAL - 20)) more"

          JSON=$(cat "$CLEAN_FILE" | jq -R . | jq -s -c .)
          echo "targets_json=$JSON" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          cp "$CLEAN_FILE" "$GITHUB_WORKSPACE/targets_parsed.txt"

      - name: Upload Target List
        uses: actions/upload-artifact@v4
        with:
          name: targets-list-${{ github.run_number }}
          path: targets_parsed.txt

  scan:
    name: 'Scan ${{ matrix.target }}'
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.timeout) }}

    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(github.event.inputs.parallel) }}
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets_json) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Verify Secrets
        run: |
          if [ -z "$XALGORIX_API_KEY" ]; then
            echo "Error: KIMI_API_KEY secret is not set!"
            exit 1
          fi
          echo "Kimi API Key: OK"

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq nmap ncat curl wget whois dnsutils jq 2>&1 | tail -3

          export PATH=$(go env GOPATH)/bin:$PATH
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest 2>/dev/null || true
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest 2>/dev/null || true
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest 2>/dev/null || true
          go install github.com/ffuf/ffuf/v2@latest 2>/dev/null || true

          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build Xalgorix
        run: |
          go mod tidy
          go build -buildvcs=false -o xalgorix ./cmd/xalgorix
          chmod +x xalgorix
          echo "Build OK"

      - name: Run Scan
        id: scan
        run: |
          TARGET="${{ matrix.target }}"
          MAX_ITER="${{ github.event.inputs.max_iterations }}"
          TIMEOUT_MIN="${{ github.event.inputs.timeout }}"
          INSTRUCTION='${{ github.event.inputs.instruction }}'
          JOB_IDX="${{ strategy.job-index }}"
          TOTAL_JOBS="${{ strategy.job-total }}"

          TARGET=$(echo "$TARGET" | tr -d '"' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

          echo ""
          echo "Job $((JOB_IDX + 1))/$TOTAL_JOBS: $TARGET"
          echo "  Model: ${{ github.event.inputs.model }}"
          echo "  Max iterations: $MAX_ITER"
          echo "  Timeout: ${TIMEOUT_MIN} min"

          mkdir -p "scan-results/${JOB_IDX}"

          ARGS="--target $TARGET"
          [ -n "$INSTRUCTION" ] && ARGS="$ARGS --instruction '$INSTRUCTION'"

          # timeout command uses SECONDS, convert minutes to seconds
          TIMEOUT_SEC=$((TIMEOUT_MIN * 60))
          echo "  Starting scan (timeout: ${TIMEOUT_MIN}min)..."

          timeout ${TIMEOUT_SEC}s ./xalgorix $ARGS 2>&1 | tee "scan-results/${JOB_IDX}/scan.log" || EC=$?

          echo ""
          if [ "${EC:-0}" -eq 124 ] || [ "${EC:-0}" -eq 137 ]; then
            echo "Scan timed out: $TARGET"
          elif [ "${EC:-0}" -ne 0 ]; then
            echo "Scan exited with code ${EC:-?}: $TARGET"
          else
            echo "Scan completed: $TARGET"
          fi

      - name: Collect Results
        if: always()
        run: |
          IDX="${{ strategy.job-index }}"
          TARGET="${{ matrix.target }}"
          mkdir -p "scan-results/${IDX}"

          # Save target info
          echo "target: ${TARGET}" > "scan-results/${IDX}/target-info.txt"
          echo "timestamp: $(date -Iseconds)" >> "scan-results/${IDX}/target-info.txt"

          # Copy result files from repo root
          for ext in html json md txt log; do
            find . -maxdepth 1 -name "*.${ext}" -exec cp {} "scan-results/${IDX}/" \; 2>/dev/null || true
          done

          # Remove scan.log from collected files (too large, report will contain summary)
          rm -f "scan-results/${IDX}/scan.log" 2>/dev/null || true

          find "scan-results/${IDX}" -type f -size +50M -delete 2>/dev/null || true
          echo "Collected $(find scan-results/${IDX} -type f | wc -l) files"

      - name: Generate Vulnerability Report
        if: always()
        run: |
          IDX="${{ strategy.job-index }}"
          TARGET="${{ matrix.target }}"
          LOG_FILE="scan-results/${IDX}/scan.log"
          REPORT_FILE="scan-results/${IDX}/vuln-report.md"

          # Count vulnerabilities found
          VULN_COUNT=$(grep -c "✅ Vulnerability reported" "$LOG_FILE" 2>/dev/null || echo 0)

          echo "========================================"
          echo "  Vulnerability Report Generator"
          echo "========================================"
          echo "Target: $TARGET"
          echo "Vulnerabilities found: $VULN_COUNT"

          # Generate report header
          {
            echo "# Xalgorix Vulnerability Report"
            echo ""
            echo "| Item | Detail |"
            echo "|------|--------|"
            echo "| **Target** | $TARGET |"
            echo "| **Scan Time** | $(date '+%Y-%m-%d %H:%M:%S UTC') |"
            echo "| **Vulnerabilities** | $VULN_COUNT |"
            echo "| **Model** | ${{ github.event.inputs.model }} |"
            echo "| **Run ID** | #${{ github.run_number }} |"
            echo ""
            echo "---"
            echo ""
          } > "$REPORT_FILE"

          if [ "$VULN_COUNT" -eq 0 ]; then
            {
              echo ""
              echo "## Result"
              echo ""
              echo "No exploitable vulnerabilities were discovered."
              echo ""
              echo "---"
              echo ""
              echo "> Scan completed without finding actionable vulnerabilities."
              echo ""
            } >> "$REPORT_FILE"
          else
            {
              echo ""
              echo "## Vulnerabilities Found ($VULN_COUNT)"
              echo ""
            } >> "$REPORT_FILE"

            # Extract each vulnerability from log
            grep "✅ Vulnerability reported" "$LOG_FILE" | while read -r line; do
              echo "- $line" >> "$REPORT_FILE"
            done

            {
              echo ""
              echo "---"
              echo ""
              echo "## Detailed Findings"
              echo ""
            } >> "$REPORT_FILE"

            # Extract tool outputs that look like vulnerability reports
            awk '/### (Vulnerability|Finding|Exploit|Impact|Proof)/,/---/{print}' "$LOG_FILE" >> "$REPORT_FILE" 2>/dev/null || true

            {
              echo ""
              echo "## Raw Scan Log"
              echo ""
              echo '```'
            } >> "$REPORT_FILE"

            tail -200 "$LOG_FILE" >> "$REPORT_FILE"
            echo '```' >> "$REPORT_FILE"
          fi

          {
            echo ""
            echo "---"
            echo ""
            echo "> Generated by Xalgorix v4 + Kimi Code"
          } >> "$REPORT_FILE"

          echo "$(wc -l < "$REPORT_FILE") lines written to $REPORT_FILE"
          echo "Report generated"

      - name: Push Vuln Report to DingTalk
        if: always() && env.XALGORIX_DING_WEBHOOK != '' && env.XALGORIX_DING_SECRET != ''
        run: |
          IDX="${{ strategy.job-index }}"
          TARGET="${{ matrix.target }}"
          LOG_FILE="scan-results/${IDX}/scan.log"
          REPORT_FILE="scan-results/${IDX}/vuln-report.md"
          WEBHOOK="${{ secrets.DING_WEBHOOK }}"
          SECRET="${{ secrets.DING_SECRET }}"

          # Count vulnerabilities
          VULN_COUNT=$(grep -c "✅ Vulnerability reported" "$LOG_FILE" 2>/dev/null || echo 0)

          # Severity colors
          CRIT_COUNT=$(grep -c "CRITICAL" "$REPORT_FILE" 2>/dev/null || echo 0)
          HIGH_COUNT=$(grep -c "HIGH" "$REPORT_FILE" 2>/dev/null || echo 0)
          MED_COUNT=$(grep -c "MEDIUM" "$REPORT_FILE" 2>/dev/null || echo 0)
          LOW_COUNT=$(grep -c "LOW" "$REPORT_FILE" 2>/dev/null || echo 0)

          # Build severity line
          SEV_LINE=""
          [ "$CRIT_COUNT" -gt 0 ] && SEV_LINE="${SEV_LINE}🔴 Critical:${CRIT_COUNT} "
          [ "$HIGH_COUNT" -gt 0 ] && SEV_LINE="${SEV_LINE}🟠 High:${HIGH_COUNT} "
          [ "$MED_COUNT" -gt 0 ] && SEV_LINE="${SEV_LINE}🟡 Medium:${MED_COUNT} "
          [ "$LOW_COUNT" -gt 0 ] && SEV_LINE="${SEV_LINE}🔵 Low:${LOW_COUNT} "

          # Extract vulnerability titles (first 5)
          VULN_LIST=$(grep "✅ Vulnerability reported" "$LOG_FILE" 2>/dev/null | head -5 | sed 's/^.*✅ Vulnerability reported: \[//;s/\].*$//' | sed 's/^/\n- /' | tr -d '\n')

          # Truncate target for display
          DISPLAY_TARGET=$(echo "$TARGET" | sed 's|^https\?://||;s|/.*$||' | cut -c1-40)

          TIMESTAMP=$(date +%s000)
          STRING_TO_SIGN="${TIMESTAMP}\n${SECRET}"
          SIGN=$(printf '%s' "$STRING_TO_SIGN" | openssl dgst -sha256 -hmac "$SECRET" -binary | base64 | tr -d '\n' | jq -sRr '@uri')

          if [ "$VULN_COUNT" -eq 0 ]; then
            MSG_TEXT="## 🛡️ $DISPLAY_TARGET - No Vulnerabilities\n\n**Result:** No exploitable vulnerabilities found.\n\n> Scan completed. Full report in GitHub Actions Artifacts."
          else
            MSG_TEXT="## 🚨 $DISPLAY_TARGET - $VULN_COUNT Vulnerabilities Found\n\n**Severity:** ${SEV_LINE}\n\n**Findings:**${VULN_LIST}\n\n> Full report: scan-target-${IDX}/vuln-report.md (GitHub Actions Artifacts)"
          fi

          # Write JSON payload without heredoc
          printf '{"msgtype":"markdown","markdown":{"title":"Xalgorix Vuln Report: %s","text":"%s"}}' \
            "$DISPLAY_TARGET" "$MSG_TEXT" > /tmp/ding-vuln-${IDX}.json

          curl -s "${WEBHOOK}&timestamp=${TIMESTAMP}&sign=${SIGN}" \
            -H "Content-Type: application/json" -d @/tmp/ding-vuln-${IDX}.json

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-target-${{ strategy.job-index }}
          path: scan-results/${{ strategy.job-index }}/
          retention-days: 14
          if-no-files-found: ignore

  notify:
    name: 'Notify'
    needs: [prepare, scan]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: DingTalk Summary
        run: |
          WEBHOOK="${{ secrets.DING_WEBHOOK }}"
          SECRET="${{ secrets.DING_SECRET }}"

          if [ -z "$WEBHOOK" ] || [ -z "$SECRET" ]; then
            echo "DingTalk not configured, skipping"
            exit 0
          fi

          TOTAL="${{ needs.prepare.outputs.total }}"
          STATUS="${{ needs.scan.result }}"

          case "$STATUS" in
            success) EMOJI="OK"; COLOR="#00CC66" ;;
            failure) EMOJI="FAIL"; COLOR="#FF0000" ;;
            *)       EMOJI="WARN"; COLOR="#FFAA00" ;;
          esac

          TIMESTAMP=$(date +%s000)
          STRING_TO_SIGN="${TIMESTAMP}\n${SECRET}"
          SIGN=$(printf '%s' "$STRING_TO_SIGN" | openssl dgst -sha256 -hmac "$SECRET" -binary | base64 | tr -d '\n' | jq -sRr '@uri')

          # Build JSON with printf to avoid heredoc indent problems
          printf '{"msgtype":"markdown","markdown":{"title":"Xalgorix Scan Complete","text":"## Xalgorix Scan Complete\\n\\n| Item | Detail |\\n|------|--------|\\n| **Status** | <font color=\\"%s\\">%s %s</font> |\\n| **Targets** | %s |\\n| **Parallel** | ${{ github.event.inputs.parallel }} |\\n| **Run** | #${{ github.run_number }} |\\n| **Time** | $(date '+%Y-%m-%d %H:%M:%S') |\\n\\n> Results available in GitHub Actions Artifacts."}}' \
            "$COLOR" "$EMOJI" "$STATUS" "$TOTAL" > /tmp/ding.json

          curl -s "${WEBHOOK}&timestamp=${TIMESTAMP}&sign=${SIGN}" \
            -H "Content-Type: application/json" -d @/tmp/ding.json
